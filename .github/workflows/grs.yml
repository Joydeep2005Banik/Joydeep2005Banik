name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Joydeep2005Banik/readme-stats-cards@v1
        with:
          username: Joydeep2005Banik
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: blue-green
